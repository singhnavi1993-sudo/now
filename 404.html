<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Playing Game - now-gg.com</title>

    <base href="/">

    <link rel="stylesheet" href="style.css">
    <style>
        /* Special styles for the Play Page */
        body, html {
            margin: 0;
            padding: 0;
            background: #0b0d14;
            color: white;
            font-family: sans-serif;
        }

        .play-container {
            display: flex;
            padding: 20px;
            gap: 20px;
            height: 85vh;
        }

        .game-screen {
            flex: 3;
            background: #000;
            border-radius: 15px;
            border: 2px solid #2d2f3e;
        }

        .ad-sidebar {
            flex: 1;
            background: #1c1f2e;
            border-radius: 15px;
            padding: 20px;
            text-align: center;
            color: #888;
        }

        /* Launcher Styling for Paid Games */
        .launcher-overlay {
            flex: 3;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background: #161b22;
            border-radius: 15px;
            border: 2px solid #2d2f3e;
            padding: 40px;
            text-align: center;
        }

        .launcher-btn {
            padding: 18px 45px;
            background: #ff0055;
            color: white;
            border: none;
            border-radius: 50px;
            font-size: 1.3rem;
            cursor: pointer;
            font-weight: bold;
            transition: transform 0.2s ease, background 0.2s ease;
            box-shadow: 0 4px 15px rgba(255, 0, 85, 0.3);
            text-decoration: none;
        }

            .launcher-btn:hover {
                background: #ff3377;
                transform: scale(1.05);
            }

        .launcher-img {
            width: 180px;
            height: 180px;
            object-fit: cover;
            border-radius: 20px;
            margin-bottom: 20px;
            border: 3px solid #ff0055;
        }
    </style>
</head>
<body>
    <header class="main-header" style="padding: 15px;">
        <a href="/" class="logo-text" style="text-decoration:none; color: #ff0055; font-weight: bold;">← Back to Home</a>
    </header>

    <div class="play-container">
        <iframe id="gameFrame" class="game-screen" src="about:blank"></iframe>

        <div class="ad-sidebar">
            <h3>Advertisements</h3>
            <div style="background:#2d2f3e; height:200px; margin-bottom:20px; border-radius:10px; display: flex; align-items: center; justify-content: center;">Ad Unit 1</div>
            <div style="background:#2d2f3e; height:200px; border-radius:10px; display: flex; align-items: center; justify-content: center;">Ad Unit 2</div>
        </div>
    </div>

    <script>
        async function loadGame() {
            try {
                // 1. Get the slug from the URL (e.g., /games/free-online-game/wsup-ai)
                const pathSegments = window.location.pathname.split('/');
                const urlSlug = pathSegments.filter(s => s !== "").pop();

                if (!urlSlug || urlSlug === "play.html") {
                    console.error("No valid game slug found");
                    return;
                }

                // 2. Fetch the games database
                const response = await fetch('/games.json');
                const games = await response.json();

                // 3. Find the game matching the URL slug
                const game = games.find(g => {
                    const jsonSlug = g.slug || g.title.toLowerCase().replace(/\s+/g, '-').replace(/[^\w\-]+/g, '');
                    return jsonSlug === urlSlug;
                });

                const frame = document.getElementById('gameFrame');
                const container = document.querySelector('.play-container');

                if (game) {
                    document.title = "Playing " + game.title + " - now-gg.com";

                    if (game.isPaid === true) {
                        // PAID GAME: Hide iframe and show the "Play Now" Launcher
                        frame.style.display = "none";

                        const launcherHTML = `
                                <div class="launcher-overlay">
                                    <img src="${game.image}" class="launcher-img" alt="${game.title}">
                                    <h2 style="font-size: 2.2rem; margin: 0 0 10px 0;">${game.title}</h2>
                                    <p style="color:#aaa; margin-bottom: 35px; max-width: 450px;">
                                        This premium game is hosted on official secure servers.
                                        Click below to start playing.
                                    </p>
                                    <button class="launcher-btn" onclick="window.location.href='${game.link}'">
                                        PLAY NOW →
                                    </button>
                                </div>`;

                        container.insertAdjacentHTML('afterbegin', launcherHTML);
                    } else {
                        // FREE GAME: Show iframe and load the game link
                        frame.src = game.link;
                        frame.style.display = "block";
                    }
                } else {
                    // GAME NOT FOUND: Show error message
                    frame.style.display = "none";
                    container.innerHTML = `
                            <div style="flex:3; text-align:center; padding:100px 20px; background:#161b22; border-radius:15px;">
                                <h2 style="color:#ff0055; font-size: 2rem;">Game Not Found</h2>
                                <p style="color:#888;">Sorry, we couldn't find a game matching: <b>${urlSlug}</b></p>
                                <br>
                                <a href="/" style="color: white; text-decoration: none; background: #2d2f3e; padding: 10px 20px; border-radius: 5px;">Return to Homepage</a>
                            </div>`;
                }
            } catch (error) {
                console.error("System Error:", error);
            }
        }

        window.onload = loadGame;
    </script>
</body>
</html>
